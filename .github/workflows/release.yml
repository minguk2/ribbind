name: Release

# Tag-triggered only. We deliberately do NOT run on every push — a previous
# build.yml (per-commit) workflow consistently red-failed because it called
# scripts/dead-field-check.sh which has since been removed, and per-commit
# builds add no value when the dev loop already runs validator + build-app
# locally before each push. Tags are the canonical "ship this" signal.
on:
  push:
    tags: ['v*']

permissions:
  # Required for softprops/action-gh-release to create the Release object
  # and upload .zip / .sha256 assets. Without this the action 403s.
  contents: write

jobs:
  release:
    # macos-14 = Apple Silicon (arm64) with recent Xcode preinstalled. Matches
    # the user's dev machine arch so the shipped binary won't surprise them on
    # arm64. (x86_64 users can still rebuild from source via the README's
    # terminal install path — universal build is a future enhancement once
    # demand is verified.)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p || true
          xcrun --find xcbuild 2>&1 || echo "xcbuild not found"
          ls /Applications | grep -i xcode || echo "No Xcode in /Applications"
          swift --version
          uname -a

      # Tier 1 — fail fast on Codable round-trips, catalog hex invariants,
      # encoder safety. ValidationHarness skips fixture-dependent checks
      # automatically when Office isn't installed and the user's plist
      # absent — CI is exactly that environment.
      - name: Run ValidationHarness (Tier 1, no fixtures on CI)
        run: swift run -c release ValidationHarness

      - name: Build .app bundle (universal — arm64 + x86_64, ad-hoc signed)
        # Universal build so the released .app runs on both Apple Silicon AND
        # Intel Macs natively (no Rosetta penalty). Swift PM produces a fat
        # Mach-O via `--arch arm64 --arch x86_64`; build-app.sh handles the
        # build-output-path difference (apple/Products/Release vs the
        # single-arch arm64-apple-macosx/release).
        #
        # macos-14 runner ships with Xcode 15 at /Applications/Xcode.app;
        # universal build needs xcbuild from there (CLT alone is not enough).
        # `sudo xcode-select -s` ensures we point at Xcode's toolchain, not
        # the bare Command Line Tools dir (which lacks xcbuild).
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcode-select -p
          ./scripts/build-app.sh release universal

      - name: Verify bundle signature + structure
        run: |
          codesign -dvv dist/Ribbind.app
          codesign --verify --verbose=2 dist/Ribbind.app
          test -d dist/Ribbind.app
          test -x dist/Ribbind.app/Contents/MacOS/Ribbind
          test -f dist/Ribbind.app/Contents/Info.plist
          test -f dist/Ribbind.app/Contents/Resources/AppIcon.icns

      - name: Build .dmg installer (drag-to-/Applications UX)
        # A DMG is the macOS-standard distribution format: double-click → a
        # window opens with Ribbind.app on one side and a shortcut to
        # /Applications on the other → user drags. We assemble a staging dir
        # with the .app + a symlink to /Applications, then hdiutil packs it
        # into a compressed (UDZO) read-only image. ~2 MB.
        run: |
          rm -rf dmg-staging
          mkdir dmg-staging
          cp -R dist/Ribbind.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Ribbind" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "dist/Ribbind-${{ github.ref_name }}.dmg"
          shasum -a 256 "dist/Ribbind-${{ github.ref_name }}.dmg" \
            > "dist/Ribbind-${{ github.ref_name }}.dmg.sha256"
          ls -lh "dist/Ribbind-${{ github.ref_name }}.dmg"

      - name: Also build a plain .zip (for users who script installs)
        run: |
          cd dist
          # `ditto -c -k --keepParent` preserves the .app bundle structure,
          # ACLs, and extended attributes through the zip — `zip -r` does
          # NOT and produces unusable .app archives on macOS.
          ditto -c -k --keepParent Ribbind.app Ribbind-${{ github.ref_name }}.zip
          shasum -a 256 Ribbind-${{ github.ref_name }}.zip > Ribbind-${{ github.ref_name }}.zip.sha256
          ls -lh Ribbind-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/Ribbind-${{ github.ref_name }}.dmg
            dist/Ribbind-${{ github.ref_name }}.dmg.sha256
            dist/Ribbind-${{ github.ref_name }}.zip
            dist/Ribbind-${{ github.ref_name }}.zip.sha256
          body: |
            ## Install (drag-and-drop)

            1. Download **Ribbind-${{ github.ref_name }}.dmg** below.
            2. Double-click the DMG → a window opens with `Ribbind.app` and a shortcut to **Applications**.
            3. **Drag `Ribbind.app` onto the Applications shortcut.** Done — installed.
            4. Eject the DMG from Finder's sidebar (right-click → Eject).

            ### First launch (one-time Gatekeeper bypass)

            Ribbind is ad-hoc signed (free, no paid Apple Developer account). The first time
            you open it, macOS asks you to confirm:

            1. In Finder, open `/Applications` and **double-click `Ribbind.app`**.
            2. macOS shows: *"Ribbind" cannot be opened because Apple cannot check it for malicious software.* — click **Done**.
            3. Open **System Settings → Privacy & Security**.
            4. Scroll down. You'll see a line: *"Ribbind" was blocked to protect your Mac.* — click **Open Anyway** next to it.
            5. Authenticate with Touch ID / password.
            6. Confirm **Open**. Ribbind launches and now lives in your menu bar (no Dock icon — look for the icon at the top-right of the screen).

            After this once, double-clicking `Ribbind.app` opens it normally.

            ## First-run permissions (single click each, when prompted)

            - **Accessibility** — required for global hotkeys. The system dialog appears on first hotkey use; click *Open System Settings* and enable Ribbind in the Accessibility list.
            - **Automation** (Word / PowerPoint / Chrome) — required to dispatch the bound effect via Apple Events. macOS prompts once per app on your first shortcut for that app.

            ## What's bound out of the box

            Nothing. Open **Ribbind → Settings** from the menu bar icon and assign shortcuts.

            ## Alternative: plain .zip download

            If you'd rather not deal with mounting a DMG, **Ribbind-${{ github.ref_name }}.zip** below is the same `Ribbind.app` packaged as a zip. Unzip, drag to `/Applications`, then follow the first-launch Gatekeeper steps above.

            ## Building from source instead

            See the *Build from source* section in [README.md](https://github.com/minguk2/ribbind#build-from-source).
